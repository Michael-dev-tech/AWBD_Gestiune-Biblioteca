<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Adaugă autor</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav style="margin-bottom:20px;">
    <a href="/books">Cărți</a> |
    <a href="/author">Autori</a> |
    <a href="/category">Categorii</a> |

    <form th:action="@{/logout}" method="post" style="display:inline;">
        <button type="submit">Logout</button>
    </form>
</nav>
<h1>Adaugă / Editează autor</h1>

<form th:action="@{/author}" th:object="${author}" method="post">

    <input type="hidden" th:field="*{id}">

    <label>Nume autor:</label>
    <input type="text" th:field="*{name}">
    <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></div>

    <br><br>

    <button type="submit">Salvează</button>
</form>

<br>
<a href="/author">Înapoi la autori</a>

</body>

</html>
