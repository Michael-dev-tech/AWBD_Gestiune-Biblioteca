<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cărți - Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav style="margin-bottom:20px;">
    <a href="/books">Cărți</a> |
    <a href="/author">Autori</a> |
    <a href="/category">Categorii</a> |

    <form th:action="@{/logout}" method="post" style="display:inline;">
        <button type="submit">Logout</button>
    </form>
</nav>

<h1>Gestiune Bibliotecă</h1>

<a href="/books/new" style="display:inline-block; margin-bottom:15px; padding:10px; background-color:#4CAF50; color:white; text-decoration:none;">
    + Adaugă o carte nouă
</a>

<form th:action="@{/books/search}" method="get" style="margin-bottom: 20px;">
    <input type="text" name="keyword" th:value="${keyword}" placeholder="Caută după titlu..." required>
    <button type="submit">Caută</button>
    <a href="/books" style="margin-left: 10px; color: #e74c3c;">Resetează filtrele</a>
</form>

<table border="1" cellpadding="10">
    <thead>
    <tr>
        <th><a th:href="@{'/books/page/' + ${currentPage} + '?sortField=id&sortDir=' + ${reverseSortDir}}">ID</a></th>
        <th><a th:href="@{'/books/page/' + ${currentPage} + '?sortField=title&sortDir=' + ${reverseSortDir}}">Titlu</a></th>
        <th><a th:href="@{'/books/page/' + ${currentPage} + '?sortField=isbn&sortDir=' + ${reverseSortDir}}">ISBN</a></th>
        <th>Categorie</th>
        <th>Autori</th>
        <th>Acțiuni</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="book : ${books}">
        <td th:text="${book.id}"></td>
        <td th:text="${book.title}"></td>
        <td th:text="${book.isbn}"></td>

        <td th:text="${book.category != null ? book.category.name : '-'}"></td>

        <td>
            <span th:if="${book.authors == null || book.authors.isEmpty()}">-</span>
            <span th:each="author, iterStat : ${book.authors}">
                <span th:text="${author.name}"></span><span th:if="${!iterStat.last}">, </span>
            </span>
        </td>

        <td>
            <a th:href="@{/books/edit/{id}(id=${book.id})}">Editează</a> |
            <a th:href="@{/books/delete/{id}(id=${book.id})}" onclick="return confirm('Ești sigur?')">Șterge</a>
        </td>
    </tr>
    </tbody>
</table>

<div th:if="${totalPages > 1}">
    <br>
    <span>Total Rânduri: [[${totalItems}]]</span>
    &nbsp; &nbsp; &nbsp;

    <span>
        <a th:if="${currentPage > 1}"
           th:href="@{'/books/page/1?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">Prima</a>
        <span th:unless="${currentPage > 1}">Prima</span>
    </span>

    &nbsp; &nbsp;

    <span th:each="i: ${#numbers.sequence(1, totalPages)}">
        <a th:if="${currentPage != i}"
           th:href="@{'/books/page/' + ${i} + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">
            [[${i}]]
        </a>
        <span th:unless="${currentPage != i}">[[${i}]]</span>
        &nbsp; &nbsp;
    </span>

    <span>
        <a th:if="${currentPage < totalPages}"
           th:href="@{'/books/page/' + ${totalPages} + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">Ultima</a>
        <span th:unless="${currentPage < totalPages}">Ultima</span>
    </span>
</div>

</body>
</html>
